<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Approve">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>bhh-ops approvals</title>
<style>
  :root {
    --bg:        #0b0b0d;
    --surface:   #16171a;
    --surface-2: #1e2024;
    --line:      #2b2e34;
    --line-soft: #212429;
    --text:      #f2f3f5;
    --text-dim:  #9aa1aa;
    --text-mute: #6d747d;
    --accent:     #d4f04a;
    --accent-dim: #a8c033;
    --accent-ink: #10120a;
    --ok:     #5ad07a;
    --warn:   #f0b429;
    --danger: #ff6b5e;
    --info:   #4ecdc4;
    --r-sm:   10px;
    --r-md:   16px;
    --r-lg:   22px;
    --r-pill: 999px;
    --s-1: 4px;
    --s-2: 8px;
    --s-3: 12px;
    --s-4: 16px;
    --s-5: 24px;
    --s-6: 32px;
    --tap: 44px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --shadow-card: inset 0 1px 0 rgba(255,255,255,0.03),
                   0 6px 20px rgba(0,0,0,0.35);
    --sec-decision:  #d4f04a;
    --sec-review:    #a78bfa;
    --sec-approved:  #3ecfb2;
    --sec-blocked:   #f06ac8;
    --sec-promote:   #4dd6f0;
    --sec-ready:     #6aa2f7;
    --sec-captured:  #9aa3b2;
    --sec-neutral:   #9aa3b2;
  }
  :root {
    --green-bg: #16301f;
    --amber-bg: #3a2c10;
    --red-bg: #3a1a17;
  }
  * { box-sizing: border-box; }
  html {
    margin: 0;
    padding: 0;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    padding-top: max(var(--s-4), env(safe-area-inset-top));
    padding-bottom: max(var(--s-5), env(safe-area-inset-bottom));
    padding-left: max(var(--s-4), env(safe-area-inset-left));
    padding-right: max(var(--s-4), env(safe-area-inset-right));
  }
  #app {
    max-width: 640px;
    margin: 0 auto;
    padding: 12px 12px 40px 12px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 0 12px 0;
  }
  header h1 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0 0 var(--s-5);
  }
  button {
    font: inherit;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 10px 14px;
    min-height: var(--tap);
    min-width: 44px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:active { opacity: 0.8; }
  button:disabled { opacity: 0.42; cursor: default; }

  .banner {
    background: var(--red-bg);
    border: 1px solid var(--danger);
    color: var(--text);
    padding: var(--s-3) var(--s-4);
    border-radius: var(--r-md);
    font-size: 14px;
    margin-bottom: 12px;
  }
  .banner a { color: var(--text); }
  .hidden { display: none !important; }

  .add-queue {
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: var(--r-lg);
    padding: var(--s-4);
    margin-bottom: var(--s-4);
  }
  .add-queue summary {
    padding: 12px 10px;
    min-height: 44px;
    display: flex;
    align-items: center;
    cursor: pointer;
    font-weight: 600;
    list-style: none;
    background: color-mix(in srgb, var(--sec) 12%, transparent);
    border-left: 3px solid var(--sec);
    border-radius: var(--r-sm);
  }
  .add-queue summary::-webkit-details-marker { display: none; }
  .add-queue summary::before { content: "+ "; }
  .add-queue[open] summary::before { content: "- "; }
  #addQueueForm { padding-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
  #addQueueForm label { display: flex; flex-direction: column; gap: 4px; font-size: 0.9rem; color: var(--text-dim); }
  #addQueueForm button[type="submit"] {
    min-height: var(--tap);
    padding: 0 var(--s-4);
    border-radius: var(--r-pill);
    border: 0;
    background: var(--accent);
    color: var(--accent-ink);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  input[type="text"], input[type="password"], input[type="number"], textarea {
    font-family: var(--font);
    font-size: 16px;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: var(--s-2) var(--s-3);
    min-height: var(--tap);
    width: 100%;
  }
  textarea { min-height: 80px; resize: vertical; }
  input[type="text"]:focus, input[type="password"]:focus, input[type="number"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px rgba(212,240,74,0.15);
  }

  #runControlsForm { padding-bottom: 4px; display: flex; flex-direction: column; gap: 10px; }
  #runControlsForm label { display: flex; flex-direction: column; gap: 4px; font-size: 0.9rem; color: var(--text-dim); }
  #rcSkipBtn {
    min-height: var(--tap);
    border-radius: var(--r-pill);
    font-size: 15px;
    font-weight: 650;
    background: transparent;
    border: 1px solid currentColor;
  }
  #runControlsBody { padding-bottom: 12px; }
  .run-controls-feed {
    margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: var(--r-lg);
    padding: var(--s-4);
    margin-bottom: var(--s-4);
  }
  .run-controls-feed-head { display: flex; align-items: center; justify-content: space-between; }
  .run-controls-feed-head h3 { margin: 0; font-size: 0.8rem; letter-spacing: 0.04em; color: var(--text-dim); text-transform: uppercase; }
  #rcFeed { margin-top: 8px; }
  .badge-run-next {
    display: inline-block;
    margin-top: 10px;
    padding: 3px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(90,208,122,0.14);
    color: var(--ok);
  }
  .btn-promote {
    min-height: var(--tap);
    padding: 0 var(--s-4);
    border-radius: var(--r-pill);
    border: 0;
    background: var(--accent);
    color: var(--accent-ink);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .files-list { margin: 6px 0 0 18px; padding: 0; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; color: var(--text-dim); overflow-wrap: anywhere; }
  .files-list li { margin: 2px 0; }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    padding: 16px;
    margin-bottom: 12px;
  }
  .setup-card h2 { margin-top: 0; font-size: 1.05rem; }
  .setup-card p { color: var(--text-dim); font-size: 0.9rem; }
  .setup-card .row { display: flex; gap: 8px; margin-top: 10px; }
  .setup-card input[type="password"] { flex: 1; }

  .board-section { margin-bottom: 20px; }
  .board-section h2 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.10em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: var(--s-6) 0 var(--s-3);
    background: color-mix(in srgb, var(--sec) 12%, transparent);
    border-left: 3px solid var(--sec);
    border-radius: var(--r-sm);
    padding: 8px 10px;
  }
  .board-section h2::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: var(--r-pill);
    background: var(--sec);
    margin-right: var(--s-2);
    vertical-align: middle;
  }
  .count-pill {
    display: inline-block; margin-left: var(--s-2);
    min-width: 20px; padding: 1px 7px;
    border-radius: var(--r-pill);
    background: color-mix(in srgb, var(--sec) 18%, transparent);
    border: 1px solid color-mix(in srgb, var(--sec) 35%, transparent);
    color: var(--sec);
    font-size: 11px; font-weight: 700; letter-spacing: 0;
    text-transform: none; text-align: center;
  }
  .card-list { display: flex; flex-direction: column; gap: var(--s-3); }
  .card {
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: var(--r-lg);
    padding: var(--s-4);
    box-shadow: var(--shadow-card);
  }
  .card-flag { border-color: var(--warn); background: var(--amber-bg); }
  .card-header { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .issue-link { color: var(--text-dim); text-decoration: none; font-weight: 600; min-height: 0; font-size: 13px; line-height: 1.4; }
  .issue-title { font-size: 16.5px; font-weight: 650; line-height: 1.3; letter-spacing: -0.01em; margin: 0 0 var(--s-2); flex: 1; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    font-size: 13px;
    line-height: 1.4;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text-dim);
    padding: 3px 8px;
    border-radius: var(--r-pill);
  }
  .warning-notice {
    display: block;
    margin-top: 10px;
    padding: var(--s-2) var(--s-3);
    border-radius: var(--r-md);
    font-size: 13px;
    line-height: 1.4;
    background: rgba(255,107,94,0.14);
    color: var(--danger);
  }
  .no-verdict { color: var(--text-dim); font-style: italic; margin: 10px 0 0 0; font-size: 13px; line-height: 1.4; }
  .verdict-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 3px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .badge-merge { background: rgba(90,208,122,0.14); color: var(--ok); }
  .badge-flag { background: rgba(240,180,41,0.14); color: var(--warn); }
  .badge-legacy {
    display: inline-block;
    margin-top: 10px;
    padding: 3px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(154,161,170,0.12);
    color: var(--text-dim);
  }
  .tier-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .tier-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .tier-green { background: rgba(90,208,122,0.14); color: var(--ok); }
  .tier-red { background: rgba(255,107,94,0.14); color: var(--danger); }
  .tier-reasons { font-size: 13px; line-height: 1.4; color: var(--text-dim); }
  .fact-line { margin: 6px 0 0 0; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; color: var(--text-dim); overflow-wrap: anywhere; }
  .diff-details { margin-top: 8px; }
  .diff-details summary { cursor: pointer; color: var(--accent); font-size: 0.85rem; }
  .diff-pre {
    margin: 6px 0 0 0;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: var(--s-3);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.45;
    overflow-x: auto;
    white-space: pre;
  }
  .verdict-summary { margin: 10px 0 0 0; }
  .concerns-list { margin: 8px 0 0 0; padding-left: 20px; color: var(--text-dim); font-size: 13px; line-height: 1.4; }
  .stats-line { margin: 10px 0 0 0; font-size: 13px; line-height: 1.4; color: var(--text-dim); }
  .review-note { margin: 10px 0 0 0; font-size: 13px; line-height: 1.4; color: var(--text-dim); }
  .card-status { min-height: 1.2em; font-size: 0.85rem; color: var(--accent); margin-top: 8px; }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; }
  .card-actions button { flex: 1; }
  .btn-approve {
    min-height: var(--tap);
    padding: 0 var(--s-4);
    border-radius: var(--r-pill);
    border: 0;
    background: var(--accent);
    color: var(--accent-ink);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .btn-deny {
    min-height: var(--tap);
    border-radius: var(--r-pill);
    font-size: 15px;
    font-weight: 650;
    background: transparent;
    border: 1px solid currentColor;
    color: var(--danger);
  }
  .deny-text { margin-top: 8px; }

  .empty, .loading { color: var(--text-dim); text-align: center; padding: 40px 0; }

  footer {
    margin-top: 24px;
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  footer a { color: var(--text-dim); }
</style>
</head>
<body>
<div id="app">

  <header>
    <h1>bhh-ops approvals</h1>
    <button id="refreshBtn" type="button">Refresh</button>
  </header>

  <div id="banner" class="banner hidden"></div>

  <details id="addQueue" class="add-queue">
    <summary style="--sec: var(--sec-neutral)">Add to queue</summary>
    <form id="addQueueForm">
      <label>Title
        <input type="text" id="aqTitle" required>
      </label>
      <label>Notes (optional)
        <textarea id="aqNotes"></textarea>
      </label>
      <button type="submit">Add issue</button>
    </form>
  </details>

  <details id="runControls" class="add-queue">
    <summary style="--sec: var(--sec-neutral)">Run controls</summary>
    <div id="runControlsBody">
      <p id="rcNoControl" class="no-verdict hidden">No control issue found</p>
      <form id="runControlsForm">
        <label>Hours
          <input type="number" id="rcHours" min="1" max="8" value="4">
        </label>
        <label>Rate
          <input type="number" id="rcRate" min="1" max="6" value="2">
        </label>
        <div class="card-actions">
          <button id="rcRunBtn" type="button" disabled>Run now</button>
          <button id="rcPaceBtn" type="button" disabled>Set tonight's pace</button>
          <button id="rcSkipBtn" type="button" disabled>Skip tonight</button>
        </div>
      </form>
      <div id="rcStatus" class="card-status"></div>
      <div class="run-controls-feed">
        <div class="run-controls-feed-head">
          <h3>Status feed</h3>
          <button id="rcRefreshBtn" type="button" disabled>Refresh</button>
        </div>
        <div id="rcFeed"></div>
      </div>
    </div>
  </details>

  <div id="setupCard" class="setup-card hidden">
    <h2>Set up token</h2>
    <p>Enter a GitHub personal access token with access to beifongshopmail-cpu/bhh-ops. It is stored only in this browser's local storage.</p>
    <div class="row">
      <input type="password" id="tokenInput" placeholder="github_pat_...">
      <button id="saveTokenBtn" type="button">Save</button>
    </div>
  </div>

  <main id="board"></main>

  <footer>
    <a href="#" id="changeTokenLink">change token</a>
  </footer>

</div>

<script>
(function () {
  "use strict";

  var REPO = "beifongshopmail-cpu/bhh-ops";
  var API_BASE = "https://api.github.com";
  var TOKEN_KEY = "bhh_approve_token";

  var boardEl = document.getElementById("board");
  var bannerEl = document.getElementById("banner");
  var setupCardEl = document.getElementById("setupCard");
  var tokenInputEl = document.getElementById("tokenInput");
  var saveTokenBtn = document.getElementById("saveTokenBtn");
  var changeTokenLink = document.getElementById("changeTokenLink");
  var refreshBtn = document.getElementById("refreshBtn");
  var addQueueEl = document.getElementById("addQueue");
  var addQueueForm = document.getElementById("addQueueForm");
  var aqTitleEl = document.getElementById("aqTitle");
  var aqNotesEl = document.getElementById("aqNotes");

  var runControlsEl = document.getElementById("runControls");
  var rcNoControlEl = document.getElementById("rcNoControl");
  var rcHoursEl = document.getElementById("rcHours");
  var rcRateEl = document.getElementById("rcRate");
  var rcRunBtn = document.getElementById("rcRunBtn");
  var rcPaceBtn = document.getElementById("rcPaceBtn");
  var rcSkipBtn = document.getElementById("rcSkipBtn");
  var rcStatusEl = document.getElementById("rcStatus");
  var rcRefreshBtn = document.getElementById("rcRefreshBtn");
  var rcFeedEl = document.getElementById("rcFeed");
  var controlIssueNumber = null;
  var controlIssueLoaded = false;

  function getToken() { return localStorage.getItem(TOKEN_KEY); }
  function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function sleep(ms) { return new Promise(function (resolve) { setTimeout(resolve, ms); }); }

  function getLabelNames(issue) {
    return (issue.labels || []).map(function (l) {
      return typeof l === "string" ? l : l.name;
    });
  }

  function apiRequest(path, options) {
    var token = getToken();
    var headers = {
      "Accept": "application/vnd.github+json",
      "Authorization": "Bearer " + token
    };
    if (options && options.headers) {
      for (var k in options.headers) headers[k] = options.headers[k];
    }
    var fetchOpts = { method: (options && options.method) || "GET", headers: headers };
    if (options && options.body) fetchOpts.body = options.body;

    return fetch(API_BASE + path, fetchOpts).catch(function () {
      return Promise.reject({ type: "network" });
    }).then(function (res) {
      if (res.status === 401 || res.status === 403) {
        return Promise.reject({ type: "auth" });
      }
      if (!res.ok) {
        return Promise.reject({ type: "network" });
      }
      if (res.status === 204) return null;
      return res.json();
    });
  }

  // ---- banner / setup card ----

  function showBanner(type) {
    if (type === "auth") {
      bannerEl.innerHTML = 'Token expired or invalid. <a href="https://github.com/settings/personal-access-tokens" target="_blank" rel="noopener">Manage tokens</a>';
    } else {
      bannerEl.innerHTML = 'GitHub unreachable -- use GitHub mobile. <a href="https://github.com/beifongshopmail-cpu/bhh-ops/issues?q=is%3Aopen+label%3Aneeds-review" target="_blank" rel="noopener">Open in GitHub</a>';
    }
    bannerEl.classList.remove("hidden");
  }

  function hideBanner() {
    bannerEl.classList.add("hidden");
    bannerEl.innerHTML = "";
  }

  function handleError(err) {
    if (err && err.type === "auth") {
      showBanner("auth");
      openSetup();
    } else {
      showBanner("network");
    }
  }

  function openSetup() {
    tokenInputEl.value = "";
    setupCardEl.classList.remove("hidden");
  }

  function closeSetup() {
    setupCardEl.classList.add("hidden");
  }

  // ---- verdict comment parsing ----

  var MARKER_RE = /^<!--\s*reviewer-verdict sha:([0-9a-fA-F]+)\s*-->/;
  var VERDICT_RE = /\*\*Verdict:\s*(MERGE|FLAG)\*\*/;
  var CONCERNS_MARK = "**Concerns:**";
  var STATS_RE = /Milestone commits:\s*\d+\s*\|\s*Turns:\s*\d+\s*\|\s*Notional cost:\s*\$\d+\.\d{2}/;
  var FACTS_LINE_RE = /^([a-zA-Z]+):\s*(.*)$/;
  var TIER_RE = /^(GREEN|RED)\s*(\(([\s\S]*)\))?\s*$/i;
  var DIFF_HEADER_RE = /^DIFF @ ([0-9a-fA-F]+)\s*$/;

  function parseFacts(body) {
    var lines = body.split("\n");
    var idx = -1;
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].trim() === "FACTS") { idx = i; break; }
    }
    if (idx === -1) return null;
    var facts = {};
    for (var j = idx + 1; j < lines.length; j++) {
      var line = lines[j];
      if (line.trim() === "") break;
      var m = line.match(FACTS_LINE_RE);
      if (!m) break;
      facts[m[1].toLowerCase()] = m[2].trim();
    }
    return facts;
  }

  function parseTier(value) {
    if (!value) return null;
    var m = value.match(TIER_RE);
    if (!m) return null;
    return { color: m[1].toUpperCase(), reasons: m[3] || "" };
  }

  function findDiffComment(comments, sha) {
    if (!sha) return null;
    var found = null;
    for (var i = 0; i < comments.length; i++) {
      var body = comments[i].body || "";
      var firstLine = body.split("\n")[0].trim();
      var m = firstLine.match(DIFF_HEADER_RE);
      if (m && m[1].toLowerCase() === sha.toLowerCase()) found = body;
    }
    if (found == null) return null;
    var lines = found.split("\n");
    lines.shift();
    var rest = lines.join("\n").trim();
    var fenceMatch = rest.match(/^```[a-zA-Z]*\n([\s\S]*?)\n?```$/);
    return fenceMatch ? fenceMatch[1] : rest;
  }

  function splitFirstSentence(text) {
    var t = text || "";
    var m = t.match(/^([\s\S]*?[.!?])(\s+|$)/);
    if (m) return { first: m[1], rest: t.slice(m[0].length) };
    return { first: t, rest: "" };
  }

  function parseVerdict(comments) {
    var last = null;
    for (var i = 0; i < comments.length; i++) {
      var body = comments[i].body || "";
      if (MARKER_RE.test(body.trim())) last = comments[i];
    }

    var statsLine = null;
    for (var j = 0; j < comments.length; j++) {
      var lines = (comments[j].body || "").split("\n");
      for (var k = 0; k < lines.length; k++) {
        if (STATS_RE.test(lines[k])) statsLine = lines[k].trim();
      }
    }

    if (!last) return { verdict: null, sha: null, summary: "", concerns: [], statsLine: statsLine, facts: null, tier: null, diffComment: null, confirmRequired: false };

    var body2 = last.body.trim();
    var mm = body2.match(MARKER_RE);
    var sha = mm ? mm[1] : null;
    var vm = body2.match(VERDICT_RE);
    var verdict = vm ? vm[1] : null;
    var summary = "";
    var concerns = [];

    if (vm) {
      var afterVerdictIdx = body2.indexOf(vm[0]) + vm[0].length;
      var concernsIdx = body2.indexOf(CONCERNS_MARK);
      if (concernsIdx > -1 && concernsIdx >= afterVerdictIdx) {
        summary = body2.slice(afterVerdictIdx, concernsIdx).trim();
        var afterConcerns = body2.slice(concernsIdx + CONCERNS_MARK.length);
        var clines = afterConcerns.split("\n");
        var started = false;
        for (var c = 0; c < clines.length; c++) {
          var t = clines[c].trim();
          if (t.indexOf("- ") === 0) {
            concerns.push(t.slice(2).trim());
            started = true;
          } else if (t === "") {
            if (started) break;
          } else {
            break;
          }
        }
      } else {
        summary = body2.slice(afterVerdictIdx).trim();
      }
    }

    var facts = parseFacts(body2);
    var tier = facts ? parseTier(facts.tier) : null;
    var hasFacts = !!(facts && tier);
    var diffComment = hasFacts ? findDiffComment(comments, sha) : null;
    var confirmRequired = hasFacts ? (tier.color === "RED") : true;

    return {
      verdict: verdict,
      sha: sha,
      summary: summary,
      concerns: concerns,
      statsLine: statsLine,
      facts: hasFacts ? facts : null,
      tier: hasFacts ? tier : null,
      diffComment: diffComment,
      confirmRequired: confirmRequired
    };
  }

  // ---- issue-body section parsing (JS port of Get-Section / Get-SectionLines) ----

  function getSection(body, header) {
    var lines = String(body || "").split(/\r?\n/);
    var want = ("## " + header).toLowerCase();
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].trim().toLowerCase() === want) {
        for (var j = i + 1; j < lines.length; j++) {
          var t = lines[j].trim();
          if (t === "") continue;
          if (t.indexOf("## ") === 0) break;
          return t;
        }
      }
    }
    return null;
  }

  function getSectionLines(body, header) {
    var lines = String(body || "").split(/\r?\n/);
    var want = ("## " + header).toLowerCase();
    var out = [];
    for (var i = 0; i < lines.length; i++) {
      if (lines[i].trim().toLowerCase() === want) {
        for (var j = i + 1; j < lines.length; j++) {
          var t = lines[j].trim();
          if (t.indexOf("## ") === 0) break;
          if (t !== "") out.push(t);
        }
        break;
      }
    }
    return out;
  }

  function parseGroom(issue) {
    var body = issue.body || "";
    var cwd = getSection(body, "Repo / cwd");
    return {
      cwd: cwd,
      branch: getSection(body, "Branch"),
      test: getSection(body, "Test") || "NONE",
      files: getSectionLines(body, "Files"),
      promotable: !!cwd
    };
  }

  // ---- classification ----

  function classify(issue) {
    var labels = getLabelNames(issue);
    function has(name) { return labels.indexOf(name) !== -1; }
    if (has("approved") && has("rejected")) {
      return { section: 4, warning: "This issue has both the approved and rejected labels. Resolve manually on GitHub." };
    }
    if (has("proposed") && has("ready")) {
      return { section: 4, warning: "Half-promoted: carries both proposed and ready. The runner skips these. Remove proposed on GitHub." };
    }
    if (has("rejected")) return { section: 4 };
    if (has("approved")) return { section: 3 };
    if (has("verdict-merge") || has("verdict-flag")) return { section: 1 };
    if (has("needs-review")) return { section: 2 };
    if (has("blocked") || has("manual-only")) return { section: 4 };
    if (has("ready")) return { section: 5 };
    if (has("proposed")) return { section: 7 };
    return { section: 6 };
  }

  // ---- rendering ----

  function renderCardBody(issue, opts) {
    opts = opts || {};
    var labels = getLabelNames(issue);
    var chips = labels.map(function (l) {
      return '<span class="chip">' + escapeHtml(l) + "</span>";
    }).join("");
    var url = "https://github.com/" + REPO + "/issues/" + issue.number;
    var html = "";
    html += '<div class="card-header">';
    html += '<a class="issue-link" href="' + url + '" target="_blank" rel="noopener">#' + issue.number + "</a>";
    html += '<h3 class="issue-title">' + escapeHtml(issue.title) + "</h3>";
    html += "</div>";
    html += '<div class="chips">' + chips + "</div>";
    if (opts.warning) {
      html += '<div class="warning-notice">' + escapeHtml(opts.warning) + "</div>";
    }
    return html;
  }

  function renderReadOnlyCard(issue, opts) {
    return '<div class="card">' + renderCardBody(issue, opts) + "</div>";
  }

  function renderReadyCard(issue) {
    var num = issue.number;
    var hasRunNext = getLabelNames(issue).indexOf("run-next") !== -1;
    var html = '<div class="card" data-issue="' + num + '">';
    html += renderCardBody(issue);
    if (hasRunNext) html += '<span class="badge-run-next">Run next</span>';
    html += '<div class="card-status"></div>';
    html += '<div class="card-actions">';
    html += '<button class="btn-run-next" type="button" data-action="run-next-toggle" data-issue="' + num + '" data-active="' + (hasRunNext ? "1" : "0") + '">' + (hasRunNext ? "Remove run next" : "Run next") + "</button>";
    html += "</div>";
    html += "</div>";
    return html;
  }

  function renderProposedCard(issue) {
    var num = issue.number;
    var g = parseGroom(issue);
    var html = '<div class="card" data-issue="' + num + '">';
    html += renderCardBody(issue);
    html += '<p class="fact-line">Repo: ' + escapeHtml(g.cwd || "MISSING") + "</p>";
    if (g.branch) html += '<p class="fact-line">Branch: ' + escapeHtml(g.branch) + "</p>";
    html += '<p class="fact-line">Test: ' + escapeHtml(g.test) + "</p>";
    if (g.files.length) {
      html += '<ul class="files-list">' + g.files.map(function (f) {
        return "<li>" + escapeHtml(f) + "</li>";
      }).join("") + "</ul>";
    } else {
      html += '<p class="fact-line">Files: none listed</p>';
    }
    html += '<details class="diff-details"><summary>View full body</summary><pre class="diff-pre">' + escapeHtml(issue.body || "(empty)") + "</pre></details>";
    if (!g.promotable) {
      html += '<div class="warning-notice">No "## Repo / cwd" section -- the runner would block this. Fix the body on GitHub before promoting.</div>';
    }
    html += '<div class="card-status"></div>';
    html += '<div class="card-actions">';
    html += '<button class="btn-promote" type="button" data-action="promote" data-issue="' + num + '"' + (g.promotable ? "" : " disabled") + ">Promote to ready</button>";
    html += "</div>";
    html += "</div>";
    return html;
  }

  function renderNeedsDecisionCard(issue, v) {
    var num = issue.number;
    var hasVerdict = !!(v && v.verdict);
    var cardClasses = "card" + (hasVerdict && v.verdict === "FLAG" ? " card-flag" : "");
    var html = '<div class="' + cardClasses + '" data-issue="' + num + '">';
    html += renderCardBody(issue);

    if (!hasVerdict) {
      html += '<p class="no-verdict">awaiting reviewer text</p>';
    } else {
      var badgeClass = v.verdict === "MERGE" ? "badge-merge" : "badge-flag";
      var badgeText = v.verdict === "MERGE" ? "Reviewer recommends approve" : "Reviewer recommends hold";
      var shortSha = v.sha ? v.sha.slice(0, 7) : "";
      html += '<div class="verdict-badge ' + badgeClass + '">' + badgeText + "</div>";

      if (v.tier) {
        var sentence = splitFirstSentence(v.summary);
        html += '<p class="verdict-summary"><strong>' + escapeHtml(sentence.first) + "</strong>";
        if (sentence.rest) html += " " + escapeHtml(sentence.rest);
        html += "</p>";
        var tierClass = v.tier.color === "GREEN" ? "tier-green" : "tier-red";
        html += '<div class="tier-line"><span class="tier-badge ' + tierClass + '">' + v.tier.color + "</span>";
        if (v.tier.reasons) html += '<span class="tier-reasons">' + escapeHtml(v.tier.reasons) + "</span>";
        html += "</div>";
      } else {
        if (v.summary) html += '<p class="verdict-summary">' + escapeHtml(v.summary) + "</p>";
        html += '<span class="badge-legacy">LEGACY - open issue</span>';
      }

      if (v.concerns && v.concerns.length) {
        html += '<ul class="concerns-list">' + v.concerns.map(function (c) {
          return "<li>" + escapeHtml(c) + "</li>";
        }).join("") + "</ul>";
      }
      if (v.statsLine) html += '<p class="stats-line">' + escapeHtml(v.statsLine) + "</p>";

      if (v.facts) {
        if (v.facts.test) html += '<p class="fact-line">Test: ' + escapeHtml(v.facts.test) + "</p>";
        if (v.facts.fence) html += '<p class="fact-line">Fence: ' + escapeHtml(v.facts.fence) + "</p>";
      }

      if (v.diffComment) {
        html += '<details class="diff-details"><summary>View diff</summary><pre class="diff-pre">' + escapeHtml(v.diffComment) + "</pre></details>";
        html += '<p class="review-note">Reviewed @ ' + escapeHtml(shortSha) + "</p>";
      } else {
        html += '<p class="review-note">Reviewed @ ' + escapeHtml(shortSha) + " -- diff visible after merge.</p>";
      }
    }

    html += '<div class="card-status"></div>';
    var sha = hasVerdict ? (v.sha || "") : "";
    var confirmAttr = hasVerdict && v.confirmRequired ? "1" : "0";
    html += '<div class="card-actions">';
    html += '<button class="btn-approve" type="button" data-action="approve" data-issue="' + num + '" data-sha="' + escapeHtml(sha) + '" data-confirm="' + confirmAttr + '"' + (hasVerdict ? "" : " disabled") + ">Approve</button>";
    html += '<button class="btn-deny" type="button" data-action="deny" data-issue="' + num + '" data-sha="' + escapeHtml(sha) + '">Deny</button>';
    html += "</div>";
    html += '<input type="text" class="deny-text" data-issue="' + num + '" placeholder="Reason (optional)">';
    html += "</div>";
    return html;
  }

  var SECTION_DEFS = [
    { n: 1, title: "Needs decision", hue: "var(--sec-decision)" },
    { n: 2, title: "Awaiting reviewer", hue: "var(--sec-review)" },
    { n: 3, title: "Approved, awaiting 1:30am", hue: "var(--sec-approved)" },
    { n: 4, title: "Blocked / manual", hue: "var(--sec-blocked)" },
    { n: 7, title: "Groomed, awaiting promotion", hue: "var(--sec-promote)" },
    { n: 5, title: "Ready / queued", hue: "var(--sec-ready)" },
    { n: 6, title: "Captured (not yet groomed)", hue: "var(--sec-captured)" }
  ];

  function renderBoard(sections, warnings, verdictData, totalCount) {
    if (totalCount === 0) {
      boardEl.innerHTML = '<p class="empty">Nothing in the pipeline.</p>';
      return;
    }
    var html = "";
    for (var i = 0; i < SECTION_DEFS.length; i++) {
      var sd = SECTION_DEFS[i];
      var items = sections[sd.n];
      if (!items || !items.length) continue;
      html += '<section class="board-section" style="--sec:' + sd.hue + '"><h2>' + escapeHtml(sd.title) + '<span class="count-pill">' + items.length + '</span></h2><div class="card-list">';
      for (var j = 0; j < items.length; j++) {
        var issue = items[j];
        if (sd.n === 1) {
          html += renderNeedsDecisionCard(issue, verdictData[issue.number]);
        } else if (sd.n === 5) {
          html += renderReadyCard(issue);
        } else if (sd.n === 7) {
          html += renderProposedCard(issue);
        } else {
          html += renderReadOnlyCard(issue, { warning: warnings[issue.number] });
        }
      }
      html += "</div></section>";
    }
    boardEl.innerHTML = html;
  }

  // ---- board load ----

  function loadBoard() {
    hideBanner();
    boardEl.innerHTML = '<p class="loading">Loading...</p>';

    return apiRequest("/repos/" + REPO + "/issues?state=open&per_page=100")
      .then(function (issues) {
        issues = issues.filter(function (i) { return !("pull_request" in i); });

        var sections = { 1: [], 2: [], 3: [], 4: [], 5: [], 6: [], 7: [] };
        var warnings = {};
        for (var i = 0; i < issues.length; i++) {
          var c = classify(issues[i]);
          sections[c.section].push(issues[i]);
          if (c.warning) warnings[issues[i].number] = c.warning;
        }

        var verdictData = {};
        var fetches = sections[1].map(function (issue) {
          return apiRequest("/repos/" + REPO + "/issues/" + issue.number + "/comments?per_page=100")
            .then(function (comments) {
              verdictData[issue.number] = parseVerdict(comments);
            });
        });

        return Promise.all(fetches).then(function () {
          renderBoard(sections, warnings, verdictData, issues.length);
        });
      })
      .catch(function (err) {
        boardEl.innerHTML = "";
        handleError(err);
      });
  }

  // ---- card status helper ----

  function showCardStatus(issueNumber, msg) {
    var el = document.querySelector('.card[data-issue="' + issueNumber + '"] .card-status');
    if (el) el.textContent = msg;
  }

  function showStatusThenReload(issueNumber, msg) {
    showCardStatus(issueNumber, msg);
    return sleep(1500).then(loadBoard);
  }

  // ---- approve / deny handlers ----

  function onApprove(btn) {
    var issueNumber = Number(btn.dataset.issue);
    var sha = btn.dataset.sha || "";
    var confirmRequired = btn.dataset.confirm === "1";

    if (confirmRequired && btn.dataset.confirming !== "1") {
      var original = btn.textContent;
      btn.dataset.confirming = "1";
      btn.dataset.originalText = original;
      btn.textContent = "Confirm approve anyway?";
      if (btn._confirmTimeout) clearTimeout(btn._confirmTimeout);
      btn._confirmTimeout = setTimeout(function () {
        btn.dataset.confirming = "0";
        btn.textContent = btn.dataset.originalText || "Approve";
      }, 5000);
      return;
    }

    if (btn._confirmTimeout) clearTimeout(btn._confirmTimeout);
    btn.disabled = true;

    apiRequest("/repos/" + REPO + "/issues/" + issueNumber)
      .then(function (fresh) {
        var freshLabels = getLabelNames(fresh);
        if (freshLabels.indexOf("approved") !== -1) {
          return showStatusThenReload(issueNumber, "already approved");
        }
        return apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/comments?per_page=100")
          .then(function (comments) {
            var freshVerdict = parseVerdict(comments);
            var freshSha = freshVerdict.sha || "";
            if (freshSha !== sha) {
              return showStatusThenReload(issueNumber, "verdict changed -- re-check");
            }
            return apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/labels", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ labels: ["approved"] })
            }).then(loadBoard);
          });
      })
      .catch(function (err) {
        handleError(err);
        btn.disabled = false;
      });
  }

  function onDeny(btn) {
    var issueNumber = Number(btn.dataset.issue);
    var sha = btn.dataset.sha || "";
    btn.disabled = true;

    apiRequest("/repos/" + REPO + "/issues/" + issueNumber)
      .then(function (fresh) {
        var freshLabels = getLabelNames(fresh);
        if (freshLabels.indexOf("rejected") !== -1) {
          return showStatusThenReload(issueNumber, "already rejected");
        }
        return apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/comments?per_page=100")
          .then(function (comments) {
            var freshVerdict = parseVerdict(comments);
            var freshSha = freshVerdict.sha || "";
            if (freshSha !== sha) {
              return showStatusThenReload(issueNumber, "verdict changed -- re-check");
            }
            return apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/labels", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ labels: ["rejected"] })
            }).then(function () {
              var textInput = document.querySelector('.deny-text[data-issue="' + issueNumber + '"]');
              var text = textInput ? textInput.value.trim() : "";
              if (text) {
                return apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/comments", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ body: "Rejected via approval page: " + text })
                });
              }
            }).then(loadBoard);
          });
      })
      .catch(function (err) {
        handleError(err);
        btn.disabled = false;
      });
  }

  function onRunNextToggle(btn) {
    var issueNumber = Number(btn.dataset.issue);
    var active = btn.dataset.active === "1";
    btn.disabled = true;
    var req = active
      ? apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/labels/run-next", { method: "DELETE" })
      : apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/labels", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ labels: ["run-next"] })
        });
    req.then(loadBoard).catch(function (err) {
      handleError(err);
      btn.disabled = false;
    });
  }

  function onPromote(btn) {
    var issueNumber = Number(btn.dataset.issue);
    armConfirm(btn, "Confirm promote?", "Promote to ready", function () {
      btn.disabled = true;
      apiRequest("/repos/" + REPO + "/issues/" + issueNumber)
        .then(function (fresh) {
          var freshLabels = getLabelNames(fresh);
          if (freshLabels.indexOf("ready") !== -1) {
            return showStatusThenReload(issueNumber, "already promoted");
          }
          if (freshLabels.indexOf("proposed") === -1) {
            return showStatusThenReload(issueNumber, "no longer proposed -- re-check");
          }
          showCardStatus(issueNumber, "promoting...");
          return apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/labels", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ labels: ["ready"] })
          }).then(function () {
            return apiRequest("/repos/" + REPO + "/issues/" + issueNumber + "/labels/proposed", {
              method: "DELETE"
            }).catch(function (err) {
              showCardStatus(issueNumber, "HALF-PROMOTED: ready added, proposed NOT removed -- remove it on GitHub");
              btn.disabled = false;
              throw err;
            });
          }).then(loadBoard);
        })
        .catch(function (err) {
          handleError(err);
          btn.disabled = false;
        });
    });
  }

  boardEl.addEventListener("click", function (e) {
    var btn = e.target.closest("button[data-action]");
    if (!btn) return;
    if (btn.dataset.action === "approve") onApprove(btn);
    else if (btn.dataset.action === "deny") onDeny(btn);
    else if (btn.dataset.action === "run-next-toggle") onRunNextToggle(btn);
    else if (btn.dataset.action === "promote") onPromote(btn);
  });

  // ---- setup card ----

  saveTokenBtn.addEventListener("click", function () {
    var val = tokenInputEl.value.trim();
    if (!val) return;
    setToken(val);
    closeSetup();
    loadBoard();
  });

  changeTokenLink.addEventListener("click", function (e) {
    e.preventDefault();
    openSetup();
  });

  // ---- header / add to queue ----

  refreshBtn.addEventListener("click", function () { loadBoard(); });

  addQueueForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var title = aqTitleEl.value.trim();
    if (!title) return;
    var notes = aqNotesEl.value;
    var submitBtn = addQueueForm.querySelector('button[type="submit"]');
    submitBtn.disabled = true;

    apiRequest("/repos/" + REPO + "/issues", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: title, body: notes || "" })
    }).then(function () {
      aqTitleEl.value = "";
      aqNotesEl.value = "";
      addQueueEl.open = false;
      return loadBoard();
    }).catch(function (err) {
      handleError(err);
    }).then(function () {
      submitBtn.disabled = false;
    });
  });

  // ---- run controls ----

  function relativeTime(iso) {
    var then = new Date(iso).getTime();
    var diffSec = Math.floor((Date.now() - then) / 1000);
    if (diffSec < 60) return diffSec + "s ago";
    var m = Math.floor(diffSec / 60);
    if (m < 60) return m + "m ago";
    var h = Math.floor(m / 60);
    if (h < 24) return h + "h ago";
    var d = Math.floor(h / 24);
    return d + "d ago";
  }

  function getHoursRate() {
    var hours = parseInt(rcHoursEl.value, 10);
    var rate = parseInt(rcRateEl.value, 10);
    if (!(hours >= 1 && hours <= 8 && rate >= 1 && rate <= 6)) return null;
    return { hours: hours, rate: rate };
  }

  function setControlButtonsEnabled(enabled) {
    rcRunBtn.disabled = !enabled;
    rcPaceBtn.disabled = !enabled;
    rcSkipBtn.disabled = !enabled;
    rcRefreshBtn.disabled = !enabled;
  }

  function loadFeed() {
    if (!controlIssueNumber) {
      rcFeedEl.innerHTML = "";
      return Promise.resolve();
    }
    rcFeedEl.innerHTML = '<p class="loading">Loading...</p>';
    return apiRequest("/repos/" + REPO + "/issues/" + controlIssueNumber + "/comments?per_page=100")
      .then(function (comments) {
        var last5 = comments.slice(-5).reverse();
        if (!last5.length) {
          rcFeedEl.innerHTML = '<p class="no-verdict">No comments yet</p>';
          return;
        }
        rcFeedEl.innerHTML = last5.map(function (c) {
          var firstLine = (c.body || "").split("\n")[0];
          return '<p class="fact-line">' + escapeHtml(firstLine) + ' <span class="tier-reasons">(' + escapeHtml(relativeTime(c.created_at)) + ")</span></p>";
        }).join("");
      })
      .catch(function (err) {
        rcFeedEl.innerHTML = "";
        handleError(err);
      });
  }

  function loadControlIssue() {
    setControlButtonsEnabled(false);
    rcNoControlEl.classList.add("hidden");
    return apiRequest("/repos/" + REPO + "/issues?state=open&labels=control&per_page=100")
      .then(function (issues) {
        issues = issues.filter(function (i) { return !("pull_request" in i); });
        if (!issues.length) {
          controlIssueNumber = null;
          rcNoControlEl.classList.remove("hidden");
          rcFeedEl.innerHTML = "";
          return;
        }
        controlIssueNumber = issues[0].number;
        setControlButtonsEnabled(true);
        return loadFeed();
      })
      .catch(function (err) {
        controlIssueNumber = null;
        handleError(err);
      });
  }

  function postControlComment(text) {
    setControlButtonsEnabled(false);
    rcStatusEl.textContent = "";
    apiRequest("/repos/" + REPO + "/issues/" + controlIssueNumber + "/comments", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ body: text })
    }).then(function () {
      rcStatusEl.textContent = "Posted: " + text;
      setControlButtonsEnabled(true);
      loadFeed();
    }).catch(function (err) {
      handleError(err);
      setControlButtonsEnabled(true);
    });
  }

  function armConfirm(btn, confirmText, defaultText, onConfirmed) {
    if (btn.dataset.confirming !== "1") {
      btn.dataset.confirming = "1";
      btn.dataset.originalText = btn.textContent;
      btn.textContent = confirmText;
      if (btn._confirmTimeout) clearTimeout(btn._confirmTimeout);
      btn._confirmTimeout = setTimeout(function () {
        btn.dataset.confirming = "0";
        btn.textContent = btn.dataset.originalText || defaultText;
      }, 5000);
      return;
    }
    if (btn._confirmTimeout) clearTimeout(btn._confirmTimeout);
    btn.dataset.confirming = "0";
    btn.textContent = btn.dataset.originalText || defaultText;
    onConfirmed();
  }

  rcRunBtn.addEventListener("click", function () {
    if (!controlIssueNumber) return;
    var hr = getHoursRate();
    if (!hr) { rcStatusEl.textContent = "Invalid hours/rate"; return; }
    armConfirm(rcRunBtn, "Confirm run now?", "Run now", function () {
      postControlComment("RUN hours=" + hr.hours + " rate=" + hr.rate);
    });
  });

  rcPaceBtn.addEventListener("click", function () {
    if (!controlIssueNumber) return;
    var hr = getHoursRate();
    if (!hr) { rcStatusEl.textContent = "Invalid hours/rate"; return; }
    postControlComment("PACE hours=" + hr.hours + " rate=" + hr.rate);
  });

  rcSkipBtn.addEventListener("click", function () {
    if (!controlIssueNumber) return;
    armConfirm(rcSkipBtn, "Confirm skip?", "Skip tonight", function () {
      postControlComment("SKIP");
    });
  });

  rcRefreshBtn.addEventListener("click", function () { loadFeed(); });

  runControlsEl.addEventListener("toggle", function () {
    if (runControlsEl.open && !controlIssueLoaded) {
      controlIssueLoaded = true;
      loadControlIssue();
    }
  });

  // ---- init ----

  function init() {
    var token = getToken();
    if (!token) {
      openSetup();
    } else {
      loadBoard();
    }
  }

  init();
})();
</script>
</body>
</html>
